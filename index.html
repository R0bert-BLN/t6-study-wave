<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classes | StudyWave</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="flex h-screen overflow-hidden">

<!-- SIDEBAR -->
<aside class="w-64 bg-[#111] text-zinc-400 flex flex-col justify-between flex-shrink-0 z-20 py-6 pl-4 pr-2">
    <div>
        <div class="flex items-center gap-3 mb-10 text-white px-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(37,99,235,0.5)]">
                <i class="ph-bold ph-waves text-white text-lg"></i></div>
            <span class="text-lg font-bold tracking-tight">StudyWave</span>
        </div>
        <nav class="flex flex-col gap-1 pr-2">
            <p class="text-[10px] font-bold text-zinc-600 uppercase tracking-widest mb-3 ml-3">Menu</p>
            <a href="index.html"
               class="flex items-center w-full gap-3 px-3 py-2 rounded-lg font-medium text-[13px] transition-all text-white bg-zinc-800/50"><i
                    class="ph-fill ph-books text-lg text-blue-500"></i> Classes</a>
            <a href="schedule.html"
               class="flex items-center w-full gap-3 px-3 py-2 rounded-lg hover:bg-zinc-900 hover:text-white font-medium text-[13px] transition-all"><i
                    class="ph ph-calendar-blank text-lg"></i> Schedule</a>
            <a href="evaluate.html"
               class="flex justify-between items-center w-full px-3 py-2 rounded-lg hover:bg-zinc-900 hover:text-white font-medium text-[13px] transition-all">
                <div class="flex items-center gap-3"><i class="ph ph-check-circle text-lg"></i> To Evaluate</div>
            </a>
            <a href="todo.html"
               class="flex items-center w-full gap-3 px-3 py-2 rounded-lg hover:bg-zinc-900 hover:text-white font-medium text-[13px] transition-all">
                <div class="flex items-center gap-3"><i class="ph ph-books text-lg"></i> To Do</div>
            </a>
            <a href="notes.html"
               class="flex items-center w-full gap-3 px-3 py-2 rounded-lg hover:bg-zinc-900 hover:text-white font-medium text-[13px] transition-all"><i
                    class="ph ph-notebook text-lg"></i> Notes</a>

            <p class="text-[10px] font-bold text-zinc-600 uppercase tracking-widest mb-3 ml-3 mt-6">System</p>
            <a href="archived.html"
               class="flex items-center w-full gap-3 px-3 py-2 rounded-lg hover:bg-zinc-900 hover:text-white font-medium text-[13px] transition-all"><i
                    class="ph ph-archive text-lg"></i> Archived</a>
            <a href="settings.html"
               class="flex items-center w-full gap-3 px-3 py-2 rounded-lg hover:bg-zinc-900 hover:text-white font-medium text-[13px] transition-all"><i
                    class="ph ph-gear text-lg"></i> Settings</a>
        </nav>
    </div>
    <div class="flex items-center gap-3 px-2">
        <img src="https://ui-avatars.com/api/?name=Alex+P&background=333&color=fff" class="w-8 h-8 rounded-full">
        <div class="flex-1 overflow-hidden"><p class="text-[13px] font-medium text-white">Alex Popescu</p>
            <p class="text-[11px] text-zinc-600">Professor</p></div>
    </div>
</aside>

<!-- MAIN CONTENT -->
<main class="flex-1 overflow-y-auto relative p-8 lg:p-12">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-end mb-10">
            <div><h1 class="text-3xl font-bold text-zinc-900 tracking-tight">Active Classes</h1>
                <p class="text-zinc-500 mt-2">Manage your ongoing courses and students.</p></div>
            <div class="flex gap-3">
                <button class="text-zinc-500 hover:text-zinc-900 px-3 py-2 font-medium text-[13px]"><i
                        class="ph ph-magnifying-glass mr-2"></i> Search
                </button>
                <button onclick="toggleModal('modal-create-class')"
                        class="bg-zinc-900 text-white px-5 py-2.5 rounded-full text-[13px] font-medium hover:bg-black transition-all shadow-lg shadow-zinc-200">
                    <i class="ph ph-plus mr-1"></i> Create Class
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <a href="class-inner.html" class="block group relative">
                <div class="h-60 rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-600 p-6 flex flex-col justify-between shadow-xl shadow-blue-200 transition-transform hover:-translate-y-1">
                    <div class="flex justify-between items-start"><span
                            class="bg-white/20 text-white text-[10px] font-bold px-2 py-1 rounded-full uppercase backdrop-blur-md">Web Dev</span><i
                            class="ph-fill ph-dots-three-circle text-white/50 text-2xl hover:text-white"></i></div>
                    <div><h3 class="text-2xl font-bold text-white mb-1">Frontend Adv.</h3>
                        <p class="text-blue-100 text-[13px]">85 Students</p></div>
                </div>
            </a>
            <a href="#l" class="block group relative">
                <div class="h-60 rounded-2xl bg-gradient-to-br from-red-600 to-red-400 p-6 flex flex-col justify-between shadow-xl shadow-blue-200 transition-transform hover:-translate-y-1">
                    <div class="flex justify-between items-start"><span
                            class="bg-white/20 text-white text-[10px] font-bold px-2 py-1 rounded-full uppercase backdrop-blur-md">Web Dev</span><i
                            class="ph-fill ph-dots-three-circle text-white/50 text-2xl hover:text-white"></i></div>
                    <div><h3 class="text-2xl font-bold text-white mb-1">Backend Adv.</h3>
                        <p class="text-blue-100 text-[13px]">85 Students</p></div>
                </div>
            </a>
        </div>
    </div>
</main>

<!-- Modal Create Class -->
<div id="modal-create-class" class="modal-backdrop"
     onclick="if(event.target === this) toggleModal('modal-create-class')">
    <div class="bg-white p-8 w-full max-w-md shadow-2xl rounded-2xl">
        <h2 class="text-2xl font-bold mb-6">Create Class</h2>
        <input type="text" placeholder="Class Name" class="input-fluid text-lg mb-4">
        <input type="text" placeholder="Subject / Category" class="input-fluid mb-8">
        <div class="flex justify-end gap-4">
            <button onclick="toggleModal('modal-create-class')" class="text-zinc-500 font-medium text-[13px]">Cancel
            </button>
            <button onclick="toggleModal('modal-create-class')"
                    class="bg-black text-white px-6 py-2 text-[13px] font-bold rounded-full">Create
            </button>
        </div>
    </div>
</div>

<script>
    function toggleModal(id) {
        document.getElementById(id).classList.toggle('open');
    }
</script>
</body>
</html>
